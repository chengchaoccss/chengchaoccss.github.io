<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LGNS 实时资产价值追踪</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">LGNS · Origin LGNS</p>
        <h1>实时资产价值追踪</h1>
        <p class="desc">自动拉取 LGNS 最新美元价格，输入你的持币量后，实时计算总价值并绘制价值曲线。</p>
      </div>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">准备获取价格…</span>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <label for="amount">我的 LGNS 数量</label>
        <input id="amount" type="number" min="0" step="0.0001" placeholder="例如：600" />
        <div class="hint">输入后会保存到本地浏览器，下次打开自动带出。</div>
      </div>

      <div class="card metric">
        <span>LGNS 当前价格</span>
        <strong id="price">$--</strong>
        <small id="priceChange">更新时间：--</small>
      </div>

      <div class="card metric">
        <span>我的总价值</span>
        <strong id="totalValue">$--</strong>
        <small id="amountText">数量：-- LGNS</small>
      </div>

      <div class="card metric">
        <span>刷新频率</span>
        <strong id="refreshText">30s</strong>
        <small>CoinGecko 免费接口，别刷太猛</small>
      </div>
    </section>

    <section class="card chartCard">
      <div class="chartHead">
        <div>
          <h2>实时价值曲线</h2>
          <p>页面打开后开始记录；曲线数据保存在本地浏览器。</p>
        </div>
        <button id="clearBtn">清空曲线</button>
      </div>
      <canvas id="valueChart"></canvas>
    </section>

    <section class="card note">
      <h2>说明</h2>
      <p>价格来源：CoinGecko Simple Price API，币种 ID：<code>origin-lgns</code>。由于免费公开接口可能有频率限制，默认每 30 秒刷新一次。</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
